<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Recipe Details</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#ff6b6b", "background-light": "#ffffff", "background-dark": "#1a1a1a", "off-white": "#fcf8f8" },
                    fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 20px; }
    </style>
</head>
<body class="bg-gray-200 font-display flex items-center justify-center min-h-screen p-4 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1495195134817-aeb325a55b65?q=80&w=2076')">
    
    <a href="javascript:history.back()" class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm"></a>

    <div class="relative z-50 w-full max-w-5xl h-[90vh] flex flex-col bg-background-light dark:bg-background-dark rounded-2xl shadow-2xl overflow-hidden">
        
        <button onclick="history.back()" class="absolute top-4 right-4 z-20 p-2 rounded-full bg-white/90 text-black hover:bg-white shadow-sm border border-gray-200">
            <span class="material-symbols-outlined">close</span>
        </button>

        <div class="overflow-y-auto custom-scrollbar flex-1 pb-10" id="content-area">
            <div class="h-full flex items-center justify-center">
                <p class="text-xl font-bold animate-pulse">Loading Recipe...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const recipeId = params.get('id');
            const contentArea = document.getElementById('content-area');

            if (!recipeId) return;

            try {
                // 1. Fetch details from backend
                const response = await fetch(`/api/recipe/${recipeId}`);
                
                // Check if the fetch itself failed
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 2. Build Ingredient List HTML
                // FIX: Used data.ingredients (simple array) instead of data.extendedIngredients
                let ingredientsHtml = '<p class="text-gray-500">No ingredients listed.</p>';
                if (data.ingredients && data.ingredients.length > 0) {
                    ingredientsHtml = data.ingredients.map(ingredientStr => `
                        <label class="flex gap-x-3 items-start p-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg transition-colors">
                            <input type="checkbox" class="mt-1 h-5 w-5 text-primary rounded border-gray-300 focus:ring-primary">
                            <span class="text-gray-800 dark:text-gray-200 text-base leading-relaxed">${ingredientStr}</span>
                        </label>
                    `).join('');
                }

                // 3. Build Instructions HTML
                // FIX: Uses data.instructions (simple array) instead of analyzedInstructions
                let instructionsHtml = '<p class="text-gray-500 italic">No instructions provided.</p>';
                if (data.instructions && data.instructions.length > 0) {
                    instructionsHtml = data.instructions.map((stepText, index) => `
                        <div class="flex gap-6 group mb-8">
                            <div class="shrink-0">
                                <div class="flex items-center justify-center h-10 w-10 rounded-full bg-primary text-white font-bold shadow-md">${index + 1}</div>
                            </div>
                            <div class="pt-1">
                                <p class="text-gray-600 dark:text-gray-300 leading-relaxed text-base">${stepText}</p>
                            </div>
                        </div>
                    `).join('');
                }

                // 4. Inject into DOM
                contentArea.innerHTML = `
                    <div class="relative h-64 md:h-80 w-full shrink-0">
                        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('${data.image}');"></div>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent md:hidden"></div>
                        <div class="absolute bottom-0 left-0 p-6 md:hidden">
                            <h1 class="text-white text-3xl font-bold">${data.title}</h1>
                        </div>
                    </div>

                    <div class="px-6 md:px-10 py-6 border-b border-gray-100 dark:border-gray-800">
                        <h1 class="hidden md:block text-4xl font-extrabold mb-2 dark:text-white">${data.title}</h1>
                        <div class="flex gap-4 text-gray-500 font-medium text-sm">
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-lg">schedule</span> ${data.time || 'N/A'} min</span>
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-lg">restaurant</span> ${data.servings || '2'} servings</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-0 lg:gap-8 items-start">
                        <div class="lg:col-span-4 bg-off-white dark:bg-[#222] p-6 lg:p-10 lg:min-h-[500px] border-r border-gray-100 dark:border-gray-800">
                            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 dark:text-white">
                                <span class="material-symbols-outlined text-primary">grocery</span> Ingredients
                            </h2>
                            <div class="flex flex-col gap-1">${ingredientsHtml}</div>
                        </div>

                        <div class="lg:col-span-8 p-6 lg:p-10">
                            <h2 class="text-2xl font-bold mb-8 dark:text-white">Instructions</h2>
                            <div class="relative">
                                <div class="absolute left-[19px] top-4 bottom-4 w-[2px] bg-gray-100 -z-10 hidden md:block"></div>
                                ${instructionsHtml}
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error("Error loading recipe:", error);
                contentArea.innerHTML = `
                    <div class="p-10 text-center flex flex-col items-center gap-4">
                        <span class="material-symbols-outlined text-6xl text-red-400">error</span>
                        <p class="text-red-500 font-bold text-xl">Failed to load recipe details.</p>
                        <p class="text-gray-500">Please try again or select a different recipe.</p>
                        <button onclick="history.back()" class="px-6 py-2 bg-gray-800 text-white rounded-lg">Go Back</button>
                    </div>`;
            }
        });
    </script>
</body>
</html>
