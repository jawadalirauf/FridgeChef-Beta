<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ff6b6b",
              "background-light": "#ffffff",
              "background-dark": "#1a1a1a",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
    <title>FridgeChef Profile</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased" style="background-image: url('https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&q=80&w=1600'); background-size: cover; background-position: center; background-attachment: fixed;">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden bg-black/30">
<div class="layout-container flex h-full grow flex-col">
    
    <header class="flex items-center justify-between border-b border-white/10 px-6 py-4 md:px-10 backdrop-blur-md bg-white/10">
        <a href="index.html" class="flex items-center gap-3 text-white transition-opacity hover:opacity-80">
            <div class="size-8 flex items-center justify-center bg-primary rounded-lg">
                <span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1">kitchen</span>
            </div>
            <h2 class="text-white text-xl font-bold leading-tight tracking-tight">FridgeChef</h2>
        </a>
        <nav class="hidden md:flex items-center gap-8 ml-8 flex-1">
            <a class="text-white/80 hover:text-white font-semibold transition-colors text-sm uppercase tracking-wider" href="index.html">Home</a>
        </nav>
        <div class="flex items-center gap-4">
            <button onclick="logout()" class="flex h-10 items-center justify-center rounded-xl bg-white/10 px-4 text-white hover:bg-white/20 transition-all font-bold text-sm">
                LOGOUT
            </button>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="max-w-[420px] w-full flex flex-col items-center bg-white/20 dark:bg-slate-900/40 backdrop-blur-xl border border-white/30 dark:border-white/10 rounded-[2.5rem] p-10 shadow-2xl">
            
            <div class="flex flex-col items-center gap-6 text-center">
                <div class="relative">
                    <div class="absolute -inset-1.5 bg-gradient-to-tr from-primary to-orange-400 rounded-full blur opacity-30"></div>
                    <div class="relative size-40 md:size-44 rounded-full border-4 border-white/50 bg-slate-200 bg-center bg-no-repeat bg-cover shadow-2xl" 
                         style='background-image: url("https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&q=80&w=400");'>
                    </div>
                </div>

                <div class="space-y-3">
                    <h1 id="profileName" class="text-white text-4xl font-extrabold leading-tight tracking-tight drop-shadow-sm">
                        Julian Chefry
                    </h1>
                    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-primary text-white shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1">verified</span>
                        <p class="text-xs font-bold uppercase tracking-widest">Master Chef</p>
                    </div>
                    <p class="text-white/80 text-sm font-medium italic max-w-[280px] pt-2">
                        "Turning everyday ingredients into extraordinary meals."
                    </p>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-8 text-center">
        <p class="text-white/60 text-xs tracking-widest uppercase">© 2024 FridgeChef Inc.</p>
    </footer>
</div>
</div>

<script>
    // This script runs as soon as the profile page loads
    document.addEventListener('DOMContentLoaded', () => {
        // Grab the name that was saved during the login process
        const storedName = localStorage.getItem('chefName');
        
        if (storedName) {
            // Replace "Julian Chefry" with the actual name from your SQL database
            document.getElementById('profileName').textContent = storedName;
        } else {
            // If someone tries to access profile.html without logging in, send them back to login
            window.location.href = 'login.html';
        }
    });

    // Function to handle logout
    function logout() {
        // Clear the user data from memory
        localStorage.removeItem('chefName');
        // Redirect to login page
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
