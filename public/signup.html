<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff6b6b",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative min-h-screen w-full flex flex-col overflow-x-hidden">
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-black/40 z-10"></div>
        <div class="w-full h-full bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA6hHn7wc65Io4yxoB2Bp4vqsUJxcatLk0tZl7LHK-CPdEd07yMTgKAHi6VXSGEwb69QjAyowU4m4N1Os7Z3QvoYvexrWUeF2OWaXdGssR0NQxeUZsfDxIxjatFiBcXT0YUWYABovzjl06_u4DvoJIUXzqf9oKLz2E7rzPWHVGK5y7iyVKvkFau-nio6MSEjTZged8UzW2U9sL-VVCQtTlmHzEkpkgAx4INJKTxGRp7auEtTepl-w_MSwyd3yKlf1-hoGbhJFAZuXg')"></div>
    </div>

    <div class="relative z-20 layout-container flex h-full grow flex-col">
        <header class="flex items-center justify-between whitespace-nowrap px-6 md:px-10 py-4 lg:py-6">
            <a href="index.html" class="flex items-center gap-3 text-white">
                <div class="size-8 flex items-center justify-center bg-primary rounded-lg shadow-lg">
                    <span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1">kitchen</span>
                </div>
                <h2 class="text-white text-xl font-extrabold leading-tight tracking-tight">FridgeChef</h2>
            </a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="hidden sm:flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-5 bg-white/10 hover:bg-white/20 backdrop-blur-md text-white text-sm font-semibold border border-white/20 transition-all">
                    Explore
                </a>
                <a href="login.html" class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-5 bg-primary hover:bg-primary/90 text-white text-sm font-bold shadow-lg transition-all">
                    Login
                </a>
            </div>
        </header>

        <main class="flex-1 flex items-center justify-center p-4 md:p-10">
            <div class="w-full max-w-[480px]">
                <div class="bg-white/90 dark:bg-background-dark/90 backdrop-blur-xl rounded-xl shadow-2xl p-8 border border-white/20">
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Join FridgeChef</h1>
                        <p class="text-slate-600 dark:text-slate-400">Start creating gourmet meals from your fridge today.</p>
                    </div>
                    <form id="signupForm" class="space-y-4">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Full Name</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                                <input id="fullName" class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400" placeholder="Julian Chefry" required type="text"/>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Email Address</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                                <input id="email" class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400" placeholder="chef@example.com" required type="email"/>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Password</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                                <input id="password" class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:••••••••" required type="password"/>
                            </div>
                        </div>
                        <button class="w-full mt-2 py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/30 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 group" type="submit">
                            <span>Create Account</span>
                            <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </button>
                    </form>
                    <div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700">
                        <p class="text-center text-slate-600 dark:text-slate-400 text-sm">
                            Already have an account? 
                            <a class="text-primary font-bold hover:underline" href="login.html">Log In</a>
                        </p>
                    </div>
                </div>
            </div>
        </main>
        <footer class="p-6 text-center">
            <p class="text-white/60 text-xs">© 2024 FridgeChef. Fresh ideas for your kitchen.</p>
        </footer>
    </div>
</div>

<script>
    // Logic to handle form submission
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Collect form data
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            // Send POST request to backend
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Account created successfully! Redirecting to login...");
                window.location.href = 'login.html';
            } else {
                alert(data.error || "Signup failed. Please try again.");
            }
        } catch (error) {
            console.error("Signup Error:", error);
            alert("Could not connect to the server. Make sure node server.js is running.");
        }
    });
</script>
</body>
</html>
